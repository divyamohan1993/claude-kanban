apiVersion: v1
kind: Service
metadata:
  name: claude-kanban
  labels:
    app: claude-kanban
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 51777
      protocol: TCP
      name: http
  selector:
    app: claude-kanban
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-kanban-data
  labels:
    app: claude-kanban
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
