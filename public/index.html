<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo-mark" aria-hidden="true">&#9670;</div>
      <div>
        <h1>Claude Kanban</h1>
        <span class="subtitle">Autonomous AI Orchestrator &middot; by Claude &times; Divya Mohan</span>
      </div>
    </div>
    <div class="header-search">
      <input type="text" id="search-input" placeholder="Search cards..." aria-label="Search cards" autocomplete="off">
    </div>
    <div class="header-stats" id="header-stats"></div>
    <div class="pipeline-controls" id="pipeline-controls"></div>
    <button class="btn btn-ghost btn-icon" id="admin-btn" title="Control Panel" aria-label="Control Panel">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6.7 1.2a1.2 1.2 0 0 1 2.4 0l.2 1.1a.6.6 0 0 0 .8.4l1-.5a1.2 1.2 0 0 1 1.7 1.2l-.3 1.1a.6.6 0 0 0 .4.7l1 .4a1.2 1.2 0 0 1 0 2.3l-1 .4a.6.6 0 0 0-.4.7l.3 1.1a1.2 1.2 0 0 1-1.7 1.2l-1-.5a.6.6 0 0 0-.8.4l-.2 1.1a1.2 1.2 0 0 1-2.4 0l-.2-1.1a.6.6 0 0 0-.8-.4l-1 .5a1.2 1.2 0 0 1-1.7-1.2l.3-1.1a.6.6 0 0 0-.4-.7l-1-.4a1.2 1.2 0 0 1 0-2.3l1-.4a.6.6 0 0 0 .4-.7l-.3-1.1a1.2 1.2 0 0 1 1.7-1.2l1 .5a.6.6 0 0 0 .8-.4l.2-1.1zM8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/></svg>
    </button>
    <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle theme" aria-label="Toggle dark mode">
      <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M13.36 10.06A6 6 0 015.94 2.64 7 7 0 1013.36 10.06z"/></svg>
    </button>
    <button class="btn btn-ghost" id="archive-btn" style="font-size:12px" title="View archived/completed cards">Archive</button>
    <button class="btn btn-primary" id="add-btn" title="Create a new kanban card (keyboard: N)">+ New Card</button>
  </header>

  <!-- Search Results Dropdown -->
  <div class="search-results" id="search-results" role="listbox" aria-label="Search results"></div>

  <main class="board" id="board"></main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="card-modal" role="dialog" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Card</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="card-form">
        <input type="hidden" id="card-id">
        <label for="card-title">Title</label>
        <input type="text" id="card-title" required placeholder="Project idea..." autofocus>
        <label for="card-desc">Description</label>
        <textarea id="card-desc" rows="4" placeholder="Details, goals, context..."></textarea>
        <label for="card-labels">Labels <span style="font-weight:400;color:var(--text-tertiary)">(comma-separated)</span></label>
        <input type="text" id="card-labels" placeholder="feature, security, design...">
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detail-modal" role="dialog" aria-labelledby="detail-title">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 id="detail-title">Card Details</h2>
        <button class="modal-close" id="detail-close" aria-label="Close">&times;</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <!-- Folder Picker Modal -->
  <div class="modal-overlay" id="folder-modal" role="dialog" aria-labelledby="folder-modal-title">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 id="folder-modal-title">Select Project Folder</h2>
        <button class="modal-close" id="folder-close" aria-label="Close">&times;</button>
      </div>
      <p id="folder-desc" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;"></p>
      <div id="folder-matches"></div>
      <div id="folder-new" style="margin-top:12px;"></div>
    </div>
  </div>

  <!-- Archive Modal -->
  <div class="modal-overlay" id="archive-modal" role="dialog" aria-label="Archived cards">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>Archived Cards</h2>
        <button class="modal-close" id="archive-close" aria-label="Close">&times;</button>
      </div>
      <div id="archive-body"></div>
    </div>
  </div>

  <!-- Metrics Modal -->
  <div class="modal-overlay" id="metrics-modal" role="dialog" aria-label="Metrics dashboard">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>Metrics Dashboard</h2>
        <button class="modal-close" id="metrics-close" aria-label="Close">&times;</button>
      </div>
      <div id="metrics-body"></div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="import-modal" role="dialog" aria-label="Bulk import">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>Bulk Import Cards</h2>
        <button class="modal-close" id="import-close" aria-label="Close">&times;</button>
      </div>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">One card per line. Use <code style="background:var(--bg);padding:2px 4px;border-radius:3px;font-size:0.8rem;">|</code> to separate title from description.</p>
      <textarea id="import-text" rows="10" placeholder="Fix login bug | Users can't log in on mobile&#10;Add dark mode | Support system preference&#10;Refactor auth module"></textarea>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="btn btn-ghost" id="import-cancel">Cancel</button>
        <button class="btn btn-primary" id="import-submit">Import</button>
      </div>
    </div>
  </div>

  <!-- Login Overlay (shown when session required) -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-logo" aria-hidden="true">&#9670;</div>
      <div class="login-title">Claude Kanban</div>
      <div class="login-sub">Enter PIN to continue</div>
      <form id="login-form" autocomplete="off">
        <input type="password" class="login-input" id="login-pin" placeholder="PIN" autocomplete="off" maxlength="64" aria-label="Admin PIN">
        <div class="login-err" id="login-err"></div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toasts" aria-live="polite"></div>

  <!-- Keyboard shortcut hint -->
  <div class="kbd-hint" id="kbd-hint">
    Press <kbd>?</kbd> for shortcuts
  </div>

  <script src="app.js"></script>
</body>
</html>
