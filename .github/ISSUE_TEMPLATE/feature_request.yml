name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case.
      placeholder: "I often want to retry multiple failed cards at once, but I have to click each one individually."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: "A 'Retry All Failed' button in the pipeline controls that re-queues all cards with status 'interrupted' or 'error'."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Pipeline / Build
        - UI / Board
        - Admin / Control Panel
        - API
        - Security
        - Documentation
        - Other
