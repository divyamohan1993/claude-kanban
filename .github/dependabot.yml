version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "divyamohan1993"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      patch-minor:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
