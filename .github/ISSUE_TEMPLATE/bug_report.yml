name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: "When I click 'Start Work' on a card with dependencies, it starts building even though the dependency isn't done."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      placeholder: "The card should stay queued until its dependencies are in the Done column."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create card A
        2. Create card B with depends_on = A
        3. Click "Start Work" on card B
        4. Card B starts building immediately
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "v22.0.0"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output from the server log or browser console.
      render: shell
