name = "secret-vault"
main = "src/index.js"
compatibility_date = "2024-12-01"

# =============================================================================
# DEPLOYMENT
# =============================================================================
#
#   cd deploy/secret-vault-worker
#   npx wrangler deploy
#
# =============================================================================
# SECRETS SETUP (never stored in this file)
# =============================================================================
#
# Infrastructure keys (used by Worker internally, never served to clients):
#   npx wrangler secret put HMAC_KEY              # Key A: HMAC-SHA256 signing
#   npx wrangler secret put ENC_KEY               # Key B: AES-256-GCM (32-byte hex)
#   npx wrangler secret put ALLOWED_IPS           # Comma-separated: "1.2.3.4,5.6.7.8"
#   npx wrangler secret put ALLOWED_COUNTRIES     # ISO country codes: "IN,US"
#
# Vault secrets (VAULT_ prefix, served to authenticated clients):
#   npx wrangler secret put VAULT_MASTER_KEY_SHARE  # Half A of master key (32-byte hex)
#   npx wrangler secret put VAULT_JWT_SECRET        # JWT signing secret
#   npx wrangler secret put VAULT_<ANY_NAME>        # Any additional secrets
#
# =============================================================================
# KEY GENERATION (run locally, save outputs securely)
# =============================================================================
#
#   # Key A: HMAC signing key (set in Worker + client .env)
#   node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
#
#   # Key B: AES-256-GCM encryption key (set in Worker + client .env, must be 32 bytes)
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#
#   # Half A: Master key share for Worker
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#
#   # Half B: Derive key for client .env (SECRET_BROKER_DERIVE_KEY)
#   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#
# =============================================================================
# SECURITY LAYERS
# =============================================================================
#
#  1. CF edge DDoS/bot protection (automatic)
#  2. Geo-fence: ALLOWED_COUNTRIES
#  3. IP allowlist: ALLOWED_IPS (CF-Connecting-IP, unforgeable at TCP)
#  4. Progressive lockout: 3 failures = permanent block until redeploy
#  5. Rate limit: 5 req/min/IP
#  6. HMAC-SHA256 with Key A
#  7. Timestamp (30s) + nonce (anti-replay)
#  8. Request body AES-256-GCM encrypted with Key B
#  9. Response body AES-256-GCM encrypted with Key B
# 10. Key splitting: HKDF(worker_half_A, client_half_B) = actual master key
