<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Panel — Claude Kanban</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F0EB; --surface: #FFFFFF; --surface-hover: #FBF8F3; --elevated: #FFFFFF;
  --border: #C5BAB0; --border-hover: #B5AAA0;
  --text: #1B1B18; --text-secondary: #3D3A37; --text-tertiary: #524F4C;
  --primary: #D97706; --primary-soft: rgba(217,119,6,0.10); --primary-hover: #9A5B04; --primary-text: #7B4106;
  --success: #15803D; --success-soft: rgba(21,128,61,0.10); --success-text: #14532D;
  --warning: #B45309; --warning-soft: rgba(180,83,9,0.10); --warning-text: #7C2D12;
  --error: #DC2626; --error-soft: rgba(220,38,38,0.08); --error-text: #991B1B;
  --info: #2563EB; --info-soft: rgba(37,99,235,0.10); --info-text: #1E40AF;
  --purple: #7C3AED; --purple-soft: rgba(124,58,237,0.10); --purple-text: #5B21B6;
  --sidebar-w: 248px; --header-h: 56px;
  --radius: 8px; --radius-sm: 6px;
  --shadow: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
  --mono: 'Cascadia Code','SF Mono','Consolas','Monaco',monospace;
  --focus-ring: 0 0 0 3px var(--primary-soft), 0 0 0 1.5px var(--primary);
}

body.dark {
  --bg: #1A1A1D; --surface: #232326; --surface-hover: #2C2C30; --elevated: #2A2A2E;
  --border: #48484E; --border-hover: #58585F;
  --text: #F0F0F0; --text-secondary: #C8C8C8; --text-tertiary: #B0B0B0;
  --primary: #F59E0B; --primary-soft: rgba(245,158,11,0.14); --primary-hover: #D97706; --primary-text: #FBBF24;
  --success: #22C55E; --success-soft: rgba(34,197,94,0.14); --success-text: #4ADE80;
  --warning: #F59E0B; --warning-soft: rgba(245,158,11,0.14); --warning-text: #FBBF24;
  --error: #EF4444; --error-soft: rgba(239,68,68,0.14); --error-text: #FCA5A5;
  --info: #60A5FA; --info-soft: rgba(96,165,250,0.14); --info-text: #93C5FD;
  --purple: #A78BFA; --purple-soft: rgba(167,139,250,0.14); --purple-text: #C4B5FD;
  --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-lg: 0 4px 12px rgba(0,0,0,0.3);
}

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px; line-height: 1.6;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased; overflow: hidden;
}

/* === Skip link === */
.skip-link {
  position: absolute; top: -100px; left: 8px; z-index: 10000;
  padding: 10px 18px; font-size: 14px; font-weight: 600;
  background: var(--primary); color: #fff; border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  text-decoration: none; transition: top 0.15s;
}
.skip-link:focus { top: 0; outline: none; }

/* === Global focus === */
*:focus-visible {
  outline: 2px solid var(--primary); outline-offset: 2px;
  box-shadow: var(--focus-ring);
}

/* === Layout === */
.layout { display: flex; height: 100vh; }

/* === Sidebar === */
.sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; z-index: 10;
}
.sb-brand { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
.sb-logo { display: flex; align-items: center; gap: 10px; }
.sb-diamond { font-size: 24px; color: var(--primary-text); line-height: 1; }
.sb-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.sb-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; padding-left: 34px; line-height: 1.4; }
.sb-nav { padding: 10px 8px; flex: 1; }
.sb-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); padding: 12px 12px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; min-height: 44px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary);
  border: none; background: none; width: 100%; text-align: left; font-family: inherit;
  transition: background 0.15s;
}
.nav-item:hover { background: var(--surface-hover); color: var(--text); }
.nav-item:focus-visible { outline-offset: -2px; }
.nav-item.active { background: var(--primary-soft); color: var(--primary-text); font-weight: 600; }
.nav-icon { width: 20px; text-align: center; font-size: 16px; flex-shrink: 0; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto; font-size: 13px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
  background: var(--primary-soft); color: var(--primary-text);
}
.sb-footer {
  padding: 12px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px;
}
.sb-foot-btn {
  flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface);
  color: var(--text-secondary); cursor: pointer; text-align: center; text-decoration: none; display: block;
  min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.sb-foot-btn:hover { background: var(--surface-hover); color: var(--text); }

/* === Main === */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: var(--header-h); display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
.main-title { font-size: 17px; font-weight: 700; flex: 1; }
.pills { display: flex; gap: 8px; align-items: center; }
.pill {
  display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600; border: 1px solid var(--border); white-space: nowrap;
}
.pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pill-dot.green { background: var(--success); }
.pill-dot.red { background: var(--error); }
.pill-dot.amber { background: var(--warning); }
.menu-btn {
  display: none; width: 44px; height: 44px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); cursor: pointer; font-size: 18px; color: var(--text-secondary);
}
.theme-btn {
  width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.theme-btn:hover { background: var(--surface-hover); color: var(--text); }

/* === Content === */
.main-scroll { flex: 1; overflow-y: auto; }
.content { padding: 28px; max-width: 920px; }
.page { display: none; }
.page.active { display: block; }
.page-heading { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
.page-desc { font-size: 14px; color: var(--text-tertiary); margin-bottom: 22px; line-height: 1.5; }

/* === Cards === */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px;
}
.card-head {
  display: flex; align-items: center; padding: 14px 18px; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-title { font-size: 15px; font-weight: 600; flex: 1; }
.card-hint { font-size: 13px; color: var(--text-tertiary); }
.card-body { padding: 18px; }
.card-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* === Config fields === */
.cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cfg-item { display: flex; flex-direction: column; gap: 4px; }
.cfg-item.full { grid-column: 1 / -1; }
.cfg-label { font-size: 14px; font-weight: 600; color: var(--text); }
.cfg-help { font-size: 13px; color: var(--text-tertiary); line-height: 1.5; }
.cfg-input {
  width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit;
  background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); transition: border-color 0.15s; min-height: 44px;
}
.cfg-input:focus { outline: none; border-color: var(--primary); box-shadow: var(--focus-ring); }
select.cfg-input { cursor: pointer; }
.cfg-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 0; min-height: 44px; }
.cfg-switch {
  width: 44px; height: 24px; appearance: none; -webkit-appearance: none;
  background: var(--border); border-radius: 12px; position: relative; cursor: pointer;
  transition: background 0.15s; flex-shrink: 0; border: none;
}
.cfg-switch:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; box-shadow: var(--focus-ring); }
.cfg-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
  background: white; border-radius: 50%; transition: transform 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.cfg-switch:checked { background: var(--primary); }
.cfg-switch:checked::after { transform: translateX(20px); }
.cfg-switch-label { font-size: 14px; font-weight: 500; }

/* === Buttons === */
.btn {
  border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px;
  font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer;
  background: var(--surface); color: var(--text); transition: all 0.15s;
  min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
}
.btn:hover { background: var(--surface-hover); border-color: var(--border-hover); }
.btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; box-shadow: var(--focus-ring); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:focus-visible { outline-color: var(--primary-text); }
.btn-danger { background: var(--error); color: #fff; border-color: var(--error); }
.btn-danger:hover { background: #B91C1C; }
.btn-danger:focus-visible { outline-color: var(--error-text); }
.btn-sm { padding: 6px 12px; font-size: 13px; min-height: 36px; }

/* === Stats === */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 22px; }
.stat-box {
  text-align: center; padding: 16px 12px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: var(--radius);
}
.stat-val { font-size: 28px; font-weight: 700; color: var(--primary-text); font-variant-numeric: tabular-nums; line-height: 1.2; }
.stat-lbl { font-size: 13px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 4px; }

/* === Usage bars === */
.ubar { margin-bottom: 16px; }
.ubar-top { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
.ubar-name { font-weight: 600; }
.ubar-pct { font-weight: 700; font-variant-numeric: tabular-nums; }
.ubar-track { height: 12px; background: var(--bg); border-radius: 6px; overflow: hidden; border: 1.5px solid var(--border); }
.ubar-fill { height: 100%; border-radius: 6px; transition: width 0.4s; }
.ubar-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 5px; line-height: 1.5; }
.u-ok { background: var(--primary); }
.u-warn { background: var(--warning); }
.u-danger { background: var(--error); }

/* === Pipeline === */
.pipe-bar {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px;
}
.pipe-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.pipe-dot.on { background: var(--success); animation: pulse 2s ease-in-out infinite; }
.pipe-dot.off { background: var(--error); animation: blink 1.5s ease-in-out infinite; }
.pipe-label { font-size: 16px; font-weight: 600; flex: 1; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* === Queue === */
.q-item {
  display: flex; align-items: center; gap: 10px; padding: 11px 16px;
  background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  margin-bottom: 8px; font-size: 14px;
}
.q-num { font-weight: 700; color: var(--primary-text); min-width: 32px; text-align: center; font-variant-numeric: tabular-nums; }
.q-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-meta { font-size: 13px; color: var(--text-tertiary); }
.q-empty { text-align: center; padding: 24px; font-size: 14px; color: var(--text-tertiary); font-style: italic; }

/* === Sub labels === */
.sub-lbl {
  font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--text-secondary); margin: 18px 0 10px;
}
.sub-lbl:first-child { margin-top: 0; }

/* === System info === */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-row { display: flex; justify-content: space-between; padding: 10px 12px; background: var(--bg); border-radius: var(--radius-sm); font-size: 14px; gap: 12px; }
.info-key { color: var(--text-secondary); font-weight: 500; }
.info-val { font-weight: 600; font-family: var(--mono); font-size: 13px; text-align: right; word-break: break-all; }

/* === Prompt tabs === */
.ptabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.ptab {
  padding: 10px 18px; font-size: 14px; font-weight: 600; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer; background: var(--bg); color: var(--text-secondary);
  font-family: inherit; transition: all 0.15s; min-height: 44px;
}
.ptab:hover { background: var(--surface-hover); }
.ptab.active { background: var(--primary-soft); color: var(--primary-text); border-color: var(--primary); }
.peditor {
  width: 100%; min-height: 220px; padding: 16px; font-size: 14px; font-family: var(--mono);
  line-height: 1.7; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); resize: vertical;
}
.peditor:focus { outline: none; border-color: var(--primary); box-shadow: var(--focus-ring); }

/* === Process items === */
.proc-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--bg); border-radius: var(--radius-sm); margin-bottom: 8px; font-size: 14px; }
.proc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.proc-dot.building { background: var(--warning); animation: pulse 2s ease-in-out infinite; }
.proc-dot.reviewing { background: var(--error); animation: pulse 2s ease-in-out infinite; }
.proc-dot.queued { background: var(--text-tertiary); }

/* === Interactive Timeline === */
.tl-box {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 18px; margin-bottom: 16px;
}
.tl-toolbar {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.tl-zoom-btn {
  width: 44px; height: 44px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); cursor: pointer; font-size: 20px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; font-family: inherit;
  transition: background 0.15s;
}
.tl-zoom-btn:hover { background: var(--surface-hover); border-color: var(--border-hover); }
.tl-zoom-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.tl-range-info {
  font-size: 14px; color: var(--text-secondary); font-weight: 500;
  padding: 8px 14px; background: var(--bg); border-radius: var(--radius-sm);
  border: 1px solid var(--border); font-variant-numeric: tabular-nums; white-space: nowrap;
}
.tl-viewport {
  position: relative; height: 80px; overflow: hidden;
  border-radius: var(--radius-sm); background: var(--bg);
  user-select: none; -webkit-user-select: none; cursor: grab; touch-action: none;
}
.tl-viewport.panning { cursor: grabbing; }
.tl-rail {
  position: absolute; top: 50%; left: 0; right: 0; height: 3px;
  background: var(--border); border-radius: 2px; transform: translateY(-50%); pointer-events: none;
}
.tl-now-line {
  position: absolute; top: calc(50% - 16px); width: 3px; height: 32px;
  background: var(--primary); border-radius: 2px; z-index: 1;
  transform: translateX(-50%); pointer-events: none;
}
.tl-point {
  position: absolute; top: 50%; width: 18px; height: 18px; border-radius: 50%;
  transform: translate(-50%, -50%); cursor: pointer; z-index: 2;
  border: 2.5px solid var(--surface); box-shadow: 0 0 0 1px var(--border);
  transition: transform 0.12s, box-shadow 0.12s; padding: 0;
  background: none; font-size: 0; line-height: 0;
}
.tl-point:hover, .tl-point:focus-visible {
  transform: translate(-50%, -50%) scale(1.35);
  box-shadow: 0 0 0 2.5px var(--primary); z-index: 3; outline: none;
}
.tl-point.sel {
  transform: translate(-50%, -50%) scale(1.5);
  box-shadow: 0 0 0 3px var(--primary); z-index: 4;
}
.tl-point.hot { background: var(--error); }
.tl-point.hourly { background: var(--warning); }
.tl-point.daily { background: var(--success); }
.tl-point.manual { background: var(--purple); }
.tl-tip {
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500;
  padding: 6px 10px; border-radius: 4px; white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.12s; z-index: 10;
}
.tl-point:hover .tl-tip { opacity: 1; }
.tl-time-row {
  display: flex; justify-content: space-between; padding: 6px 4px 0;
}
.tl-time-mark {
  font-size: 13px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; font-weight: 500;
}
.tl-minimap {
  position: relative; height: 28px; margin-top: 12px;
  background: var(--bg); border-radius: 4px; border: 1.5px solid var(--border); overflow: hidden;
  cursor: pointer;
}
.tl-mm-vp {
  position: absolute; top: 2px; bottom: 2px;
  background: var(--primary-soft); border: 1.5px solid var(--primary); border-radius: 3px;
  min-width: 8px; transition: left 0.08s, width 0.08s;
}
.tl-mm-dot {
  position: absolute; top: 50%; width: 4px; height: 4px; border-radius: 50%;
  transform: translate(-50%, -50%); pointer-events: none;
}
.tl-legend { display: flex; gap: 16px; margin: 14px 0 6px; flex-wrap: wrap; }
.tl-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-tertiary); }
.tl-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.tl-detail {
  margin: 14px 0 0; padding: 16px 18px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); display: flex; align-items: center; gap: 14px;
  animation: fadeIn 0.15s ease;
}
.tl-detail-info { flex: 1; }
.tl-detail-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.tl-detail-meta { font-size: 13px; color: var(--text-tertiary); line-height: 1.5; }
.tl-detail-time { font-size: 20px; font-weight: 700; color: var(--primary-text); font-variant-numeric: tabular-nums; min-width: 100px; text-align: center; }
.tl-detail-actions { display: flex; gap: 8px; }

/* === Danger zone === */
.danger-box {
  padding: 16px 18px; background: var(--error-soft); border: 1px solid var(--error);
  border-radius: var(--radius-sm); display: flex; align-items: center; gap: 14px;
}
.danger-info { flex: 1; }
.danger-title { font-size: 15px; font-weight: 600; color: var(--error-text); }
.danger-desc { font-size: 14px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }

/* === Auth === */
.pin-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.pin-overlay.hidden { display: none; }
.pin-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 36px 40px; box-shadow: var(--shadow-lg); text-align: center; max-width: 380px; width: 100%; }
.pin-logo { font-size: 40px; color: var(--primary-text); margin-bottom: 10px; }
.pin-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.pin-submit { width: 100%; margin-top: 14px; padding: 12px; font-size: 15px; font-weight: 600; font-family: inherit; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; text-decoration: none; display: block; text-align: center; min-height: 44px; }
.pin-submit:hover { background: var(--primary-hover); }
.pin-submit:focus-visible { outline: 2px solid var(--primary-text); outline-offset: 2px; box-shadow: var(--focus-ring); }

/* === Toasts === */
#toasts { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 18px; font-size: 14px; box-shadow: var(--shadow-lg); max-width: 380px; animation: fadeIn 0.15s ease; transition: opacity 0.3s; line-height: 1.5; }
.toast[role="alert"] { }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.toast-error { border-left: 3px solid var(--error); }
.toast-success { border-left: 3px solid var(--success); }
.toast-info { border-left: 3px solid var(--primary); }

/* === Scrollbar === */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* === Responsive === */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { position: fixed; inset: 0; width: 260px; transform: translateX(-100%); transition: transform 0.2s; z-index: 100; }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
  .sidebar.open ~ .sb-overlay { display: block; }
  .menu-btn { display: flex; align-items: center; justify-content: center; }
  .cfg-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
  .content { padding: 20px; }
}
@media (max-width: 640px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .pills { display: none; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

          <svg id="ico-dark" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M13.36 10.06A6 6 0 015.94 2.64 7 7 0 1013.36 10.06z"/></svg>
        </button>

<script>
(function() {
'use strict';

// ── DOM helper (no innerHTML) ──
function el(tag, attrs, kids) {
  var e = document.createElement(tag);
  if (typeof attrs === 'string') { e.className = attrs; attrs = null; }
  if (attrs) {
    for (var k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'style') e.style.cssText = attrs[k];
      else if (k === 'text') e.textContent = attrs[k];
      else if (k === 'value') e.value = attrs[k];
      else if (k === 'type') e.type = attrs[k];
      else if (k === 'for') e.htmlFor = attrs[k];
      else if (k === 'selected') { if (attrs[k]) e.selected = true; }
      else if (k === 'checked') { if (attrs[k]) e.checked = true; }
      else if (k.slice(0, 2) === 'on') e.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] !== undefined && attrs[k] !== null) e.setAttribute(k, attrs[k]);
    }
  }
  if (kids !== undefined && kids !== null) {
    if (!Array.isArray(kids)) kids = [kids];
    for (var i = 0; i < kids.length; i++) {
      var c = kids[i];
      if (c === null || c === undefined) continue;
      if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    }
  }
  return e;
}
function clear(n) { while (n.firstChild) n.removeChild(n.firstChild); }

// ── Dark mode ──
var _savedTheme = localStorage.getItem('claude-kanban-theme');
var isDark = _savedTheme === 'dark' || (!_savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
if (isDark) document.body.classList.add('dark');
function syncIcons() {
  var d = document.body.classList.contains('dark');
  document.getElementById('ico-light').style.display = d ? 'none' : '';
  document.getElementById('ico-dark').style.display = d ? '' : 'none';
}
syncIcons();
function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('claude-kanban-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  syncIcons();
}
document.getElementById('theme-toggle').onclick = toggleTheme;
document.getElementById('theme-toggle-2').onclick = toggleTheme;

// ── Back link ──
(function() {
  var bp = window.__BOARD_PATH__ || '';
  if (bp) {
    document.getElementById('back-link').href = bp + '/';
  } else {
    var p = parseInt(location.port, 10);
    var boardPort = p - 1;
    document.getElementById('back-link').href = location.protocol + '//localhost:' + boardPort;
  }
})();

// ── Mobile sidebar ──
var sidebar = document.getElementById('sidebar');
var overlay = document.getElementById('sb-overlay');
var menuBtn = document.getElementById('menu-btn');
menuBtn.onclick = function() {
  var isOpen = sidebar.classList.toggle('open');
  menuBtn.setAttribute('aria-expanded', String(isOpen));
};
overlay.onclick = function() {
  sidebar.classList.remove('open');
  menuBtn.setAttribute('aria-expanded', 'false');
};

// ── Base Paths ──
var CBP = window.__BASE_PATH__ || ''; // settings/admin base path
var BOARD_BP = window.__BOARD_PATH__ || ''; // board base path (for auth endpoints)
// Auth endpoints live on the board server, so use BOARD_BP for /auth/* calls
var AUTH_BP = BOARD_BP;

// ── Auth ──
var _canManageUsers = false;
function checkSession() {
  return fetch(CBP + '/auth/session').then(function(r) { return r.json(); }).then(function(d) {
    if (d.authenticated && (d.user.role === 'admin' || d.user.role === 'superadmin')) {
      document.getElementById('pin-overlay').classList.add('hidden');
      _canManageUsers = !!d.userManagement;
      if (d.user.isDemo) showDemoBanner();
      initApp();
    } else if (d.authenticated) {
      showAccessDenied();
    } else {
      window.location.href = AUTH_BP + '/auth/login?return=' + encodeURIComponent(location.pathname);
    }
  }).catch(function() {
    window.location.href = AUTH_BP + '/auth/login?return=' + encodeURIComponent(location.pathname);
  });
}

function showDemoBanner() {
  var banner = el('div', { style: 'background:#2a1a00;color:#e8925a;text-align:center;padding:8px 12px;font-size:0.82rem;border-bottom:1px solid #e8925a33;' }, 'Demo mode (read-only). Changes are disabled for demo accounts.');
  var layout = document.querySelector('.layout');
  if (layout) { layout.parentNode.insertBefore(banner, layout); layout.style.height = 'calc(100vh - 36px)'; }
  else document.body.insertBefore(banner, document.body.firstChild);
}

function showAccessDenied() {
  var ov = document.getElementById('pin-overlay');
  ov.classList.remove('hidden');
  document.getElementById('access-denied-box').style.display = '';
  document.getElementById('denied-back-link').href = BOARD_BP + '/';
}

// ── API ──
function api(method, url, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(CBP + url, opts).then(function(r) {
    if (r.status === 401) { window.location.href = AUTH_BP + '/auth/login?return=' + encodeURIComponent(location.pathname); throw new Error('Auth'); }
    if (r.status === 403) { return r.json().catch(function() { return {}; }).then(function(d) { toast(d.error || 'Admin access required', 'error'); throw new Error(d.error || 'Forbidden'); }); }
    return r.json();
  });
}

function toast(msg, type) {
  var t = el('div', { class: 'toast toast-' + (type || 'info'), role: 'alert' }, msg);
  document.getElementById('toasts').appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 4000);
}

// ── Time helpers ──
function formatReset(iso) {
  if (!iso) return '';
  var diff = new Date(iso) - new Date();
  if (diff <= 0) return 'now';
  var h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
  if (h > 24) return 'in ' + Math.ceil(h / 24) + 'd';
  return h > 0 ? 'in ' + h + 'h ' + m + 'm' : 'in ' + m + 'm';
}
function timeAgo(iso) {
  var m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (m < 1) return 'just now';
  return m < 60 ? m + 'm ago' : Math.floor(m / 60) + 'h ' + (m % 60) + 'm ago';
}
function fmtUptime(s) { var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return h > 0 ? h + 'h ' + m + 'm' : m + 'm'; }
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}
function fmtDate(iso) {
  var d = new Date(iso);
  var day = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return day + ' ' + mon + ' ' + d.getDate() + ', ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtAgo(ms) {
  var mins = Math.floor(ms / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm ago';
  return Math.floor(hrs / 24) + 'd ' + (hrs % 24) + 'h ago';
}

// ── Config field builders ──
function cfgNumber(key, label, val, help) {
  var inputId = 'cfg-' + key;
  var helpId = help ? inputId + '-help' : null;
  var inp = el('input', { type: 'number', class: 'cfg-input', id: inputId, 'data-key': key, value: String(val != null ? val : ''), min: '0', 'aria-label': label, 'aria-describedby': helpId || undefined });
  var lbl = el('label', { class: 'cfg-label', for: inputId }, label);
  return el('div', 'cfg-item', [lbl, inp, help ? el('div', { class: 'cfg-help', id: helpId }, help) : null]);
}
function cfgText(key, label, val, help, full) {
  var inputId = 'cfg-' + key;
  var helpId = help ? inputId + '-help' : null;
  var inp = el('input', { type: 'text', class: 'cfg-input', id: inputId, 'data-key': key, value: val || '', 'aria-label': label, 'aria-describedby': helpId || undefined });
  var lbl = el('label', { class: 'cfg-label', for: inputId }, label);
  var item = el('div', 'cfg-item', [lbl, inp, help ? el('div', { class: 'cfg-help', id: helpId }, help) : null]);
  if (full) item.classList.add('full');
  return item;
}
function cfgSelect(key, label, val, options, help) {
  var inputId = 'cfg-' + key;
  var helpId = help ? inputId + '-help' : null;
  var sel = el('select', { class: 'cfg-input', id: inputId, 'data-key': key, 'aria-label': label, 'aria-describedby': helpId || undefined });
  options.forEach(function(o) { sel.appendChild(el('option', { value: o, selected: o === val }, o)); });
  var lbl = el('label', { class: 'cfg-label', for: inputId }, label);
  return el('div', 'cfg-item', [lbl, sel, help ? el('div', { class: 'cfg-help', id: helpId }, help) : null]);
}
function cfgToggle(key, label, checked, help) {
  var inputId = 'cfg-' + key;
  var helpId = help ? inputId + '-help' : null;
  var cb = el('input', { type: 'checkbox', class: 'cfg-switch', id: inputId, 'data-key': key, checked: checked, role: 'switch', 'aria-checked': String(!!checked), 'aria-describedby': helpId || undefined });
  cb.addEventListener('change', function() { cb.setAttribute('aria-checked', String(cb.checked)); });
  return el('div', 'cfg-item', [
    el('label', { class: 'cfg-toggle', for: inputId }, [cb, el('span', 'cfg-switch-label', label)]),
    help ? el('div', { class: 'cfg-help', id: helpId }, help) : null
  ]);
}

function collectInputs(container) {
  var updates = {};
  var inputs = container.querySelectorAll('.cfg-input');
  for (var i = 0; i < inputs.length; i++) {
    var inp = inputs[i];
    updates[inp.getAttribute('data-key')] = inp.type === 'number' ? Number(inp.value) : inp.value;
  }
  var switches = container.querySelectorAll('.cfg-switch');
  for (var j = 0; j < switches.length; j++) {
    updates[switches[j].getAttribute('data-key')] = switches[j].checked;
  }
  return updates;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
var NAV = [
  { id: 'overview',  icon: '\u25A6', label: 'Overview',       color: 'var(--primary)' },
  { id: 'pipeline',  icon: '\u25B6', label: 'Pipeline',       color: 'var(--success)',  badgeId: 'nav-pipe-badge' },
  { id: 'config',    icon: '\u2699', label: 'Configuration',  color: 'var(--text-tertiary)' },
  { id: 'prompts',   icon: '\u270E', label: 'Custom Prompts', color: 'var(--purple)' },
  { id: 'usage',     icon: '\u25D0', label: 'Usage',          color: 'var(--primary)',   badgeId: 'nav-usage-badge' },
  { id: 'backups',   icon: '\u21BB', label: 'Backups',        color: 'var(--success)',   badgeId: 'nav-backup-badge' },
  { id: 'system',    icon: '\u2318', label: 'System',         color: 'var(--text-tertiary)' },
  { id: 'users',     icon: '\u263A', label: 'User Mgmt',     color: 'var(--primary)',    external: '/users' },
];

var _activePage = 'overview';

function buildNav() {
  var nav = document.getElementById('sb-nav');
  clear(nav);
  nav.appendChild(el('div', 'sb-label', 'Navigation'));
  NAV.forEach(function(n) {
    if (n.id === 'users' && !_canManageUsers) return; // superadmin only
    var badge = n.badgeId ? el('span', { class: 'nav-badge', id: n.badgeId, 'aria-label': n.label + ' status' }, '--') : null;
    var item = el('button', {
      class: 'nav-item' + (n.id === _activePage ? ' active' : ''),
      id: 'nav-' + n.id,
      'data-page': n.id,
      role: 'tab',
      'aria-selected': n.id === _activePage ? 'true' : 'false',
      'aria-controls': 'page-' + n.id,
      onclick: n.external
        ? function() { window.location.href = CBP + n.external; }
        : function() { switchPage(n.id); }
    }, [
      el('span', { class: 'nav-icon', 'aria-hidden': 'true' }, n.icon),
      n.label,
      badge
    ]);
    nav.appendChild(item);
  });
}

function switchPage(id) {
  _activePage = id;
  // Update nav active state + ARIA
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    var isActive = items[i].getAttribute('data-page') === id;
    items[i].classList.toggle('active', isActive);
    items[i].setAttribute('aria-selected', String(isActive));
  }
  // Update pages
  var pages = document.querySelectorAll('.page');
  for (var j = 0; j < pages.length; j++) {
    pages[j].classList.toggle('active', pages[j].id === 'page-' + id);
  }
  // Update header title
  var entry = NAV.find(function(n) { return n.id === id; });
  document.getElementById('main-title').textContent = entry ? entry.label : id;
  // Close mobile sidebar
  sidebar.classList.remove('open');
  // Scroll to top
  document.querySelector('.main-scroll').scrollTop = 0;
}

// ══════════════════════════════════════════════
// PAGE BUILDERS
// ══════════════════════════════════════════════
function buildPages() {
  var content = document.getElementById('content');
  clear(content);
  content.appendChild(buildOverviewPage());
  content.appendChild(buildPipelinePage());
  content.appendChild(buildConfigPage());
  content.appendChild(buildPromptsPage());
  content.appendChild(buildUsagePage());
  content.appendChild(buildBackupsPage());
  content.appendChild(buildSystemPage());
}

// ── OVERVIEW ──
function buildOverviewPage() {
  var page = el('div', { class: 'page active', id: 'page-overview', role: 'tabpanel', 'aria-labelledby': 'nav-overview' });
  page.appendChild(el('h2', 'page-heading', 'Overview'));
  page.appendChild(el('p', 'page-desc', 'System health at a glance. Key metrics update in real time.'));
  page.appendChild(el('div', { class: 'stats-grid', id: 'ov-stats' }));
  page.appendChild(el('div', { id: 'ov-usage' }));

  var twoCol = el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px' });
  var activeBox = el('div', 'card', [
    el('div', 'card-head', [el('div', { class: 'card-dot', style: 'background:var(--warning)' }), el('div', 'card-title', 'Active Processes')]),
    el('div', { class: 'card-body', id: 'ov-active' })
  ]);
  var queueBox = el('div', 'card', [
    el('div', 'card-head', [el('div', { class: 'card-dot', style: 'background:var(--info)' }), el('div', 'card-title', 'Queue')]),
    el('div', { class: 'card-body', id: 'ov-queue' })
  ]);
  twoCol.appendChild(activeBox);
  twoCol.appendChild(queueBox);
  page.appendChild(twoCol);
  return page;
}

function renderOverview(pipe, queue, acts, usage) {
  var statsEl = document.getElementById('ov-stats');
  if (!statsEl) return;
  clear(statsEl);

  var active = queue.active || [], queued = queue.queue || [];
  var actKeys = Object.keys(acts || {});

  var pipeText = pipe.paused ? 'Paused' : 'Running';
  var sp = (usage && usage.plan && usage.plan.session) ? usage.plan.session.utilization : '--';

  [[pipeText, 'Pipeline'], [String(active.length), 'Active Builds'], [String(queued.length), 'Queued'], [String(sp) + (sp !== '--' ? '%' : ''), 'Usage'], [String(actKeys.length), 'Processes']].forEach(function(s) {
    statsEl.appendChild(el('div', 'stat-box', [el('div', 'stat-val', s[0]), el('div', 'stat-lbl', s[1])]));
  });

  // Usage bars
  var ub = document.getElementById('ov-usage');
  clear(ub);
  if (usage && usage.plan && usage.plan.session) {
    ub.appendChild(makeUsageBar('Session Usage', usage.plan.session.utilization, usage.plan.session.resetsAt));
  }
  if (usage && usage.plan && usage.plan.weekly) {
    ub.appendChild(makeUsageBar('Weekly Usage', usage.plan.weekly.utilization, usage.plan.weekly.resetsAt));
  }

  // Header pills
  updatePills(pipe, sp);

  // Active
  var activeEl = document.getElementById('ov-active');
  clear(activeEl);
  if (!actKeys.length) { activeEl.appendChild(el('div', 'q-empty', 'No active processes')); }
  else {
    actKeys.forEach(function(id) {
      var a = acts[id];
      var dotCls = (a.step === 'build' || a.step === 'fix') ? 'building' : a.step === 'review' ? 'reviewing' : 'queued';
      activeEl.appendChild(el('div', 'proc-item', [
        el('div', 'proc-dot ' + dotCls),
        el('div', { style: 'flex:1' }, [el('span', { style: 'font-weight:600' }, 'Card #' + id + ' '), el('span', { style: 'color:var(--text-tertiary)' }, (a.step || '') + ' - ' + (a.detail || ''))]),
      ]));
    });
  }

  // Queue
  var qEl = document.getElementById('ov-queue');
  clear(qEl);
  if (!queued.length) { qEl.appendChild(el('div', 'q-empty', 'Queue empty')); }
  else {
    queued.forEach(function(q) {
      qEl.appendChild(el('div', 'q-item', [el('span', 'q-num', String(q.position)), el('span', 'q-name', 'Card #' + q.cardId), el('span', 'q-meta', q.priority + ' priority')]));
    });
  }
}

function updatePills(pipe, usagePct) {
  var pills = document.getElementById('header-pills');
  clear(pills);
  var pipeDotCls = pipe.paused ? 'red' : 'green';
  pills.appendChild(el('div', 'pill', [el('div', 'pill-dot ' + pipeDotCls), pipe.paused ? 'Paused' : 'Running']));
  if (usagePct !== '--' && usagePct != null) {
    var pct = Number(usagePct);
    var uCls = pct >= 80 ? 'red' : pct >= 50 ? 'amber' : 'green';
    pills.appendChild(el('div', 'pill', [el('div', 'pill-dot ' + uCls), usagePct + '%']));
  }
}

// ── PIPELINE ──
function buildPipelinePage() {
  var page = el('div', { class: 'page', id: 'page-pipeline', role: 'tabpanel', 'aria-labelledby': 'nav-pipeline' });
  page.appendChild(el('h2', 'page-heading', 'Pipeline'));
  page.appendChild(el('p', 'page-desc', 'Build pipeline status, controls, active builds and queue.'));
  page.appendChild(el('div', { id: 'pipe-content' }));
  return page;
}

function renderPipeline(pipe, queue, acts) {
  var body = document.getElementById('pipe-content');
  if (!body) return;
  clear(body);

  var paused = pipe.paused;

  // Update nav badge
  var badge = document.getElementById('nav-pipe-badge');
  if (badge) {
    badge.textContent = paused ? 'Paused' : 'Running';
    badge.style.background = paused ? 'var(--error-soft)' : 'var(--success-soft)';
    badge.style.color = paused ? 'var(--error-text)' : 'var(--success-text)';
  }

  // Status bar
  var controls = el('div', { style: 'display:flex;gap:8px' });
  if (paused) {
    controls.appendChild(el('button', { class: 'btn btn-primary', onclick: function() { api('POST', '/api/pipeline/resume').then(loadPipeline); } }, 'Resume'));
  } else {
    controls.appendChild(el('button', { class: 'btn', onclick: function() { api('POST', '/api/pipeline/pause').then(loadPipeline); } }, 'Pause'));
  }
  controls.appendChild(el('button', { class: 'btn btn-danger', onclick: function() { if (confirm('Kill all active builds and pause pipeline?')) api('POST', '/api/pipeline/kill-all').then(loadPipeline); } }, 'Kill All'));

  body.appendChild(el('div', 'pipe-bar', [
    el('div', 'pipe-dot ' + (paused ? 'off' : 'on')),
    el('div', 'pipe-label', paused ? 'Pipeline Paused' : 'Pipeline Running'),
    controls,
  ]));

  var active = queue.active || [], queued = queue.queue || [];

  // Stats
  var statsRow = el('div', 'stats-grid');
  [[active.length, 'Active Builds'], [queued.length, 'Queued'], [Object.keys(acts || {}).length, 'Activities']].forEach(function(s) {
    statsRow.appendChild(el('div', 'stat-box', [el('div', 'stat-val', String(s[0])), el('div', 'stat-lbl', s[1])]));
  });
  body.appendChild(statsRow);

  // Active builds
  if (active.length) {
    body.appendChild(el('div', 'sub-lbl', 'Active Builds'));
    active.forEach(function(a) {
      var act = acts[a.cardId] || {};
      body.appendChild(el('div', 'q-item', [
        el('span', { class: 'q-num', style: 'color:var(--warning-text)' }, '#' + a.cardId),
        el('span', 'q-name', act.detail || 'Building...'),
        el('button', { class: 'btn btn-danger btn-sm', onclick: function() { api('POST', '/api/cards/' + a.cardId + '/stop').then(loadPipeline); } }, 'Stop'),
      ]));
    });
  }

  // Queue
  if (queued.length) {
    body.appendChild(el('div', { class: 'sub-lbl', style: 'margin-top:20px' }, 'Queue'));
    queued.forEach(function(q) {
      body.appendChild(el('div', 'q-item', [
        el('span', 'q-num', String(q.position)),
        el('span', 'q-name', 'Card #' + q.cardId),
        el('span', 'q-meta', q.priority + ' priority'),
      ]));
    });
  } else if (!active.length) {
    body.appendChild(el('div', 'q-empty', 'No active builds or queued cards'));
  }

  // Processes
  var actKeys = Object.keys(acts);
  if (actKeys.length) {
    body.appendChild(el('div', { class: 'sub-lbl', style: 'margin-top:20px' }, 'All Processes'));
    actKeys.forEach(function(id) {
      var a = acts[id];
      var dotCls = (a.step === 'build' || a.step === 'fix') ? 'building' : a.step === 'review' ? 'reviewing' : 'queued';
      body.appendChild(el('div', 'proc-item', [
        el('div', 'proc-dot ' + dotCls),
        el('div', { style: 'flex:1' }, [
          el('div', { style: 'font-weight:600' }, 'Card #' + id),
          el('div', { style: 'font-size:13px;color:var(--text-tertiary)' }, (a.step || '') + ' - ' + (a.detail || '')),
        ]),
        el('span', 'q-meta', timeAgo(new Date(a.timestamp).toISOString())),
      ]));
    });
  }
}

}

function renderUsage(d) {
  // Plan
  var planEl = document.getElementById('usage-plan');
  if (planEl) {
    clear(planEl);
    if (!d || !d.plan) { planEl.appendChild(el('div', 'q-empty', 'No plan data. Check ~/.claude/.credentials.json')); }
    else {
      var sp = d.plan.session ? d.plan.session.utilization : null;
      var wp = d.plan.weekly ? d.plan.weekly.utilization : null;
      if (sp !== null) planEl.appendChild(makeUsageBar('Current Session', sp, d.plan.session.resetsAt));
      if (wp !== null) planEl.appendChild(makeUsageBar('Weekly (All Models)', wp, d.plan.weekly.resetsAt));
      if (d.plan.sonnet && d.plan.sonnet.utilization !== null) planEl.appendChild(makeUsageBar('Sonnet Only', d.plan.sonnet.utilization, d.plan.sonnet.resetsAt));

      // Update nav badge
      if (sp !== null) {
        var badge = document.getElementById('nav-usage-badge');
        if (badge) {
          badge.textContent = sp + '%';
          badge.style.background = sp >= 80 ? 'var(--error-soft)' : sp >= 50 ? 'var(--warning-soft)' : 'var(--primary-soft)';
          badge.style.color = sp >= 80 ? 'var(--error-text)' : sp >= 50 ? 'var(--warning-text)' : 'var(--primary-text)';
        }
      }

      planEl.appendChild(el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-top:10px' }, [
        el('span', 'ubar-sub', 'Auto-pause at ' + (d.plan.pauseThreshold || 80) + '% \u00B7 Cached: ' + (d.plan.cachedAt ? timeAgo(d.plan.cachedAt) : 'never')),
        el('button', { class: 'btn btn-sm', onclick: function() {
          api('POST', '/api/usage/refresh').then(function(r) { renderUsage(r); toast('Usage refreshed', 'success'); });
        } }, 'Refresh'),
      ]));
    }
  }

  // Board
  var boardEl = document.getElementById('usage-board');
  if (boardEl && d && d.board) {
    clear(boardEl);
    var b = d.board;
    var statsRow = el('div', 'stats-grid');
    statsRow.appendChild(el('div', 'stat-box', [el('div', 'stat-val', String(b.hourly.count)), el('div', 'stat-lbl', 'Last Hour' + (b.hourly.limit ? ' / ' + b.hourly.limit : ''))]));
    statsRow.appendChild(el('div', 'stat-box', [el('div', 'stat-val', String(b.weekly.count)), el('div', 'stat-lbl', 'Last 7 Days' + (b.weekly.limit ? ' / ' + b.weekly.limit : ''))]));
    boardEl.appendChild(statsRow);

    function breakdownList(title, data) {
      if (!data || !data.length) return;
      boardEl.appendChild(el('div', 'sub-lbl', title));
      data.forEach(function(r) { boardEl.appendChild(el('div', 'q-item', [el('span', 'q-num', String(r.cnt)), el('span', 'q-name', r.type)])); });
    }
    breakdownList('Last Hour by Type', b.hourlyBreakdown);
    breakdownList('Last 7 Days by Type', b.weeklyBreakdown);
  }
}

// ── Timeline engine ──
function pad2(n) { return n < 10 ? '0' + n : String(n); }

function fmtTimeLabel(ts, viewRange) {
  var d = new Date(ts);
  var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (viewRange > 2 * 86400000) {
    return mon[d.getMonth()] + ' ' + d.getDate();
  } else if (viewRange > 3600000) {
    return d.getDate() + ' ' + mon[d.getMonth()] + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  } else {
    return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
  }
}

function fmtRange(ms) {
  if (ms > 86400000) return (ms / 86400000).toFixed(1).replace(/\.0$/, '') + ' days';
  if (ms > 3600000) return (ms / 3600000).toFixed(1).replace(/\.0$/, '') + ' hours';
  return Math.round(ms / 60000) + ' min';
}

function tierColor(b) {
  if (b.file && b.file.includes('manual')) return 'var(--purple)';
  return b.tier === 'hot' ? 'var(--error)' : b.tier === 'hourly' ? 'var(--warning)' : 'var(--success)';
}

function tierClass(b) {
  return (b.file && b.file.includes('manual')) ? 'manual' : b.tier;
}

function initTimeline(backups, retDays, container) {
  var now = Date.now();
  var sorted = backups.slice().sort(function(a, b) { return a.mtime - b.mtime; });

  _tl.data = sorted;
  _tl.fullEnd = now;
  _tl.fullStart = now - retDays * 86400000;
  if (sorted[0] && sorted[0].mtime < _tl.fullStart) _tl.fullStart = sorted[0].mtime - 3600000;
  _tl.viewStart = _tl.fullStart;
  _tl.viewEnd = now;
  _tl.zoom = 1;

  // ── Build DOM ──
  var zoomOutBtn = el('button', { class: 'tl-zoom-btn', 'aria-label': 'Zoom out', title: 'Zoom out (or press -)', onclick: function() { tlZoomBy(0.5); } }, '\u2212');
  var zoomInBtn = el('button', { class: 'tl-zoom-btn', 'aria-label': 'Zoom in', title: 'Zoom in (or press +)', onclick: function() { tlZoomBy(2); } }, '+');
  var rangeLabel = el('span', { class: 'tl-range-info', id: 'tl-range', 'aria-live': 'polite' });
  var resetBtn = el('button', { class: 'btn btn-sm', style: 'margin-left:auto', onclick: function() { tlResetZoom(); } }, 'Reset Zoom');
  _tl.zoomOutBtn = zoomOutBtn;
  _tl.zoomInBtn = zoomInBtn;

  var viewport = el('div', {
    class: 'tl-viewport', id: 'tl-vp', tabindex: '0',
    'aria-label': 'Backup timeline. Scroll to zoom, drag to pan, click a dot to select. Keyboard: +/- to zoom, arrows to pan, 0 to reset.',
  });
  viewport.appendChild(el('div', 'tl-rail'));
  viewport.appendChild(el('div', { id: 'tl-dots' }));

  var timeRow = el('div', { class: 'tl-time-row', id: 'tl-times' });
  var mmVp = el('div', { class: 'tl-mm-vp', id: 'tl-mm-vp' });
  var mmDots = el('div', { id: 'tl-mm-dots' });
  var minimap = el('div', { class: 'tl-minimap', id: 'tl-mm', 'aria-label': 'Timeline overview. Click to jump.' }, [mmDots, mmVp]);

  var legend = el('div', 'tl-legend', [
    el('div', 'tl-legend-item', [el('div', { class: 'tl-legend-dot', style: 'background:var(--error)' }), 'Hot (5min)']),
    el('div', 'tl-legend-item', [el('div', { class: 'tl-legend-dot', style: 'background:var(--warning)' }), 'Hourly']),
    el('div', 'tl-legend-item', [el('div', { class: 'tl-legend-dot', style: 'background:var(--success)' }), 'Daily']),
    el('div', 'tl-legend-item', [el('div', { class: 'tl-legend-dot', style: 'background:var(--purple)' }), 'Manual']),
  ]);

  var detailBox = el('div', { id: 'tl-detail-box', 'aria-live': 'polite' });

  var box = el('div', 'tl-box', [
    el('div', 'tl-toolbar', [zoomOutBtn, zoomInBtn, rangeLabel, resetBtn]),
    viewport, timeRow, minimap, legend,
  ]);
  container.appendChild(box);
  container.appendChild(detailBox);

  // Minimap dots (static)
  var fullRange = _tl.fullEnd - _tl.fullStart;
  sorted.forEach(function(b) {
    var pct = ((b.mtime - _tl.fullStart) / fullRange) * 100;
    mmDots.appendChild(el('div', { class: 'tl-mm-dot', style: 'left:' + pct + '%;background:' + tierColor(b) }));
  });

  tlUpdateView();

  // ── Wheel zoom ──
  viewport.addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = viewport.getBoundingClientRect();
    var centerPct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    var factor = e.deltaY < 0 ? 1.4 : 1 / 1.4;
    tlZoomAt(factor, centerPct);
  }, { passive: false });

  // ── Drag pan ──
  var drag = null;
  viewport.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    drag = { x: e.clientX, vs: _tl.viewStart, ve: _tl.viewEnd };
    viewport.classList.add('panning');
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!drag) return;
    var rect = viewport.getBoundingClientRect();
    var dx = e.clientX - drag.x;
    var timeRange = drag.ve - drag.vs;
    var shift = -(dx / rect.width) * timeRange;
    _tl.viewStart = drag.vs + shift;
    _tl.viewEnd = drag.ve + shift;
    tlClampView();
    tlUpdateView();
  });
  document.addEventListener('mouseup', function() {
    if (drag) { drag = null; viewport.classList.remove('panning'); }
  });

  // ── Touch pan + pinch zoom ──
  var lastTouches = null;
  viewport.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      drag = { x: e.touches[0].clientX, vs: _tl.viewStart, ve: _tl.viewEnd };
      viewport.classList.add('panning');
    }
    if (e.touches.length === 2) lastTouches = [e.touches[0].clientX, e.touches[1].clientX];
    e.preventDefault();
  }, { passive: false });
  viewport.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && drag) {
      var dx = e.touches[0].clientX - drag.x;
      var timeRange = drag.ve - drag.vs;
      var rect = viewport.getBoundingClientRect();
      var shift = -(dx / rect.width) * timeRange;
      _tl.viewStart = drag.vs + shift;
      _tl.viewEnd = drag.ve + shift;
      tlClampView();
      tlUpdateView();
    }
    if (e.touches.length === 2 && lastTouches) {
      var prevDist = Math.abs(lastTouches[1] - lastTouches[0]);
      var curDist = Math.abs(e.touches[1].clientX - e.touches[0].clientX);
      if (prevDist > 10 && curDist > 10) {
        var factor = curDist / prevDist;
        var rect2 = viewport.getBoundingClientRect();
        var mid = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect2.left) / rect2.width;
        tlZoomAt(factor, Math.max(0, Math.min(1, mid)));
      }
      lastTouches = [e.touches[0].clientX, e.touches[1].clientX];
    }
    e.preventDefault();
  }, { passive: false });
  viewport.addEventListener('touchend', function() {
    drag = null; lastTouches = null; viewport.classList.remove('panning');
  });

  // ── Keyboard ──
  viewport.addEventListener('keydown', function(e) {
    var range = _tl.viewEnd - _tl.viewStart;
    if (e.key === 'ArrowLeft') { e.preventDefault(); tlPan(-range * 0.15); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); tlPan(range * 0.15); }
    else if (e.key === '+' || e.key === '=') { e.preventDefault(); tlZoomBy(1.5); }
    else if (e.key === '-' || e.key === '_') { e.preventDefault(); tlZoomBy(1 / 1.5); }
    else if (e.key === '0' || e.key === 'Home') { e.preventDefault(); tlResetZoom(); }
  });

  // ── Minimap click to jump ──
  minimap.addEventListener('click', function(e) {
    var rect = minimap.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    var viewRange = _tl.viewEnd - _tl.viewStart;
    var center = _tl.fullStart + pct * (_tl.fullEnd - _tl.fullStart);
    _tl.viewStart = center - viewRange / 2;
    _tl.viewEnd = center + viewRange / 2;
    tlClampView();
    tlUpdateView();
  });
}

function tlZoomBy(factor) { tlZoomAt(factor, 0.5); }

function tlZoomAt(factor, centerPct) {
  var range = _tl.viewEnd - _tl.viewStart;
  var center = _tl.viewStart + range * centerPct;
  var newRange = range / factor;
  var fullRange = _tl.fullEnd - _tl.fullStart;
  if (newRange > fullRange) newRange = fullRange;
  if (newRange < 180000) newRange = 180000; // min 3 minutes
  _tl.viewStart = center - newRange * centerPct;
  _tl.viewEnd = center + newRange * (1 - centerPct);
  _tl.zoom = fullRange / newRange;
  tlClampView();
  tlUpdateView();
}

function tlPan(deltaMs) {
  _tl.viewStart += deltaMs;
  _tl.viewEnd += deltaMs;
  tlClampView();
  tlUpdateView();
}

function tlResetZoom() {
  _tl.viewStart = _tl.fullStart;
  _tl.viewEnd = _tl.fullEnd;
  _tl.zoom = 1;
  tlUpdateView();
}

function tlClampView() {
  var range = _tl.viewEnd - _tl.viewStart;
  if (_tl.viewStart < _tl.fullStart) { _tl.viewStart = _tl.fullStart; _tl.viewEnd = _tl.fullStart + range; }
  if (_tl.viewEnd > _tl.fullEnd) { _tl.viewEnd = _tl.fullEnd; _tl.viewStart = _tl.fullEnd - range; }
  if (_tl.viewStart < _tl.fullStart) _tl.viewStart = _tl.fullStart;
}

function tlUpdateView() {
  tlRenderDots();
  tlRenderTimeLabels();
  tlRenderMinimapVp();
  tlRenderRangeLabel();
  tlUpdateBtnState();
  if (_selectedBackup) {
    var box = document.getElementById('tl-detail-box');
    if (box) renderBackupDetail(_selectedBackup, box);
  }
}

function tlRenderDots() {
  var dotsEl = document.getElementById('tl-dots');
  if (!dotsEl) return;
  clear(dotsEl);
  var vs = _tl.viewStart, ve = _tl.viewEnd, range = ve - vs;
  if (range <= 0) return;

  // Now marker
  if (_tl.fullEnd >= vs && _tl.fullEnd <= ve) {
    var nowPct = ((_tl.fullEnd - vs) / range) * 100;
    dotsEl.appendChild(el('div', { class: 'tl-now-line', style: 'left:' + nowPct + '%', 'aria-hidden': 'true' }));
  }

  // Backup dots
  _tl.data.forEach(function(b) {
    if (b.mtime < vs || b.mtime > ve) return;
    var pct = ((b.mtime - vs) / range) * 100;
    var isSel = _selectedBackup && _selectedBackup.path === b.path;
    var dot = el('button', {
      class: 'tl-point ' + tierClass(b) + (isSel ? ' sel' : ''),
      style: 'left:' + pct + '%',
      'aria-label': b.file + ', ' + fmtDate(b.modified) + ', ' + fmtSize(b.size),
      onclick: function(e) {
        e.stopPropagation();
        _selectedBackup = b;
        tlRenderDots();
        renderBackupDetail(b, document.getElementById('tl-detail-box'));
      }
    });
    dot.appendChild(el('span', 'tl-tip', fmtDate(b.modified)));
    dotsEl.appendChild(dot);
  });
}

function tlRenderTimeLabels() {
  var labelsEl = document.getElementById('tl-times');
  if (!labelsEl) return;
  clear(labelsEl);
  var range = _tl.viewEnd - _tl.viewStart;
  var w = labelsEl.offsetWidth || 600;
  var count = Math.max(2, Math.min(8, Math.floor(w / 100)));
  for (var i = 0; i < count; i++) {
    var t = _tl.viewStart + (i / (count - 1)) * range;
    labelsEl.appendChild(el('span', 'tl-time-mark', fmtTimeLabel(t, range)));
  }
}

function tlRenderMinimapVp() {
  var mmVp = document.getElementById('tl-mm-vp');
  if (!mmVp) return;
  var fullRange = _tl.fullEnd - _tl.fullStart;
  var startPct = ((_tl.viewStart - _tl.fullStart) / fullRange) * 100;
  var widthPct = ((_tl.viewEnd - _tl.viewStart) / fullRange) * 100;
  mmVp.style.left = startPct + '%';
  mmVp.style.width = widthPct + '%';
}

function tlRenderRangeLabel() {
  var label = document.getElementById('tl-range');
  if (!label) return;
  var range = _tl.viewEnd - _tl.viewStart;
  var zoomStr = _tl.zoom <= 1.05 ? 'Full range' : Math.round(_tl.zoom) + 'x zoom';
  label.textContent = zoomStr + ' \u00B7 ' + fmtRange(range);
}

function tlUpdateBtnState() {
  var fullRange = _tl.fullEnd - _tl.fullStart;
  var range = _tl.viewEnd - _tl.viewStart;
  if (_tl.zoomOutBtn) _tl.zoomOutBtn.disabled = range >= fullRange * 0.99;
  if (_tl.zoomInBtn) _tl.zoomInBtn.disabled = range <= 180000;
}

function renderBackupDetail(b, container) {
  clear(container);
  var ageMs = Date.now() - b.mtime;
  var tierLabel = (b.file && b.file.includes('manual')) ? 'Manual' : b.tier.charAt(0).toUpperCase() + b.tier.slice(1);

  container.appendChild(el('div', 'tl-detail', [
    el('div', 'tl-detail-time', fmtAgo(ageMs)),
    el('div', { style: 'width:4px;height:36px;border-radius:2px;background:' + tierColor(b), 'aria-hidden': 'true' }),
    el('div', 'tl-detail-info', [
      el('div', 'tl-detail-title', b.file),
      el('div', 'tl-detail-meta', tierLabel + ' \u00B7 ' + fmtSize(b.size) + ' \u00B7 ' + fmtDate(b.modified)),
    ]),
    el('div', 'tl-detail-actions', [
      el('button', { class: 'btn btn-danger', onclick: function() {
        if (confirm('Restore database to this point?\n\n' + b.file + '\n' + fmtDate(b.modified) + '\n\nCurrent DB will be safety-backed up first.')) {
          api('POST', '/api/backups/restore', { backupPath: b.path, confirm: true }).then(function(r) {
            if (r.success) toast('Restored! Restart server to apply.', 'success');
            else toast('Restore failed: ' + r.reason, 'error');
          });
        }
      } }, 'Restore'),
    ]),
  ]));
}

function loadBackups() { api('GET', '/api/backups').then(renderBackups); }

// ── SYSTEM ──
function buildSystemPage() {

  // Housekeeping card

  // Auto-Update card

  var updateBody = el('div', { class: 'card-body', id: 'update-content' });

  body.appendChild(updateCard);
  api('GET', '/api/auto-update').then(function(cfg) { renderAutoUpdate(cfg, document.getElementById('update-content')); });

  // Danger zone
  var dangerCard = el('div', 'card', [
    el('div', { class: 'card-head', style: 'border-bottom-color:var(--error)' }, [
      el('div', { class: 'card-dot', style: 'background:var(--error)' }),
      el('div', { class: 'card-title', style: 'color:var(--error-text)' }, 'Danger Zone'),
    ]),
    el('div', 'card-body', [
      el('div', 'danger-box', [
        el('div', 'danger-info', [
          el('div', 'danger-title', 'Factory Reset'),

function renderAutoUpdate(cfg, container) {
  if (!container) return;
  clear(container);

  // Toggle row
  var toggleRow = el('div', { style: 'display:flex;align-items:center;gap:12px;margin-bottom:16px' });
  var toggleLabel = el('label', { style: 'display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem' });
  var toggleCb = el('input', { type: 'checkbox', style: 'width:18px;height:18px;cursor:pointer' });
  toggleCb.checked = !!cfg.enabled;
  toggleCb.addEventListener('change', function() {
    api('PUT', '/api/auto-update', { enabled: toggleCb.checked }).then(function(r) {
      renderAutoUpdate(r.config, container);
    });
  });
  toggleLabel.appendChild(toggleCb);
  toggleLabel.appendChild(document.createTextNode('Enable automatic updates'));
  toggleRow.appendChild(toggleLabel);

  if (cfg.enabled) {
    var intervalSel = el('select', { style: 'padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem' });
    [15, 30, 60, 120, 360, 720, 1440].forEach(function(m) {
      var label = m < 60 ? m + 'min' : (m / 60) + 'hr';
      var opt = el('option', { value: String(m) }, label);
      if (m === (cfg.intervalMins || 60)) opt.selected = true;
      intervalSel.appendChild(opt);
    });
    intervalSel.addEventListener('change', function() {
      api('PUT', '/api/auto-update', { intervalMins: Number(intervalSel.value) }).then(function(r) {
        toast('Interval set to ' + r.changed.intervalMins + ' min', 'success');
      });
    });
    toggleRow.appendChild(el('span', { style: 'font-size:0.85rem;color:var(--text-secondary)' }, 'every'));
    toggleRow.appendChild(intervalSel);
  }
  container.appendChild(toggleRow);

  if (cfg.enabled) {
    container.appendChild(el('p', { style: 'font-size:0.82rem;color:var(--text-secondary);margin:0 0 12px' }, 'When enabled, the server fetches updates from the git remote and automatically applies them (drain pipeline, pull, install, restart, rollback on failure).'));
  }

  // Status section
  var statusGrid = el('div', 'info-grid');
  var lastCheckStr = cfg.lastCheck ? new Date(cfg.lastCheck).toLocaleString() : 'Never';
  statusGrid.appendChild(el('div', 'info-row', [el('span', 'info-key', 'Last checked'), el('span', 'info-val', lastCheckStr)]));

  if (cfg.lastResult) {
    var r = cfg.lastResult;
    var statusText = r.available
      ? r.commitsBehind + ' commit' + (r.commitsBehind !== 1 ? 's' : '') + ' behind (' + r.localRev + ' \u2192 ' + r.remoteRev + ')'
      : 'Up to date (' + r.localRev + ')';
    var statusColor = r.available ? 'color:var(--warning-text)' : 'color:var(--success)';
    statusGrid.appendChild(el('div', 'info-row', [el('span', 'info-key', 'Status'), el('span', { class: 'info-val', style: statusColor }, statusText)]));

    if (r.available && r.summary) {
      var summaryPre = el('pre', { style: 'font-size:0.8rem;color:var(--text-secondary);margin:8px 0 0;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow-x:auto;white-space:pre-wrap;line-height:1.6' }, r.summary);
      statusGrid.appendChild(summaryPre);
    }
  }
  container.appendChild(statusGrid);

  // Action buttons
  var actions = el('div', { style: 'display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap' });

  var checkBtn = el('button', { class: 'btn', onclick: function() {
    checkBtn.disabled = true;
    checkBtn.textContent = 'Checking...';
    api('POST', '/api/auto-update/check').then(function(result) {
      api('GET', '/api/auto-update').then(function(cfg2) { renderAutoUpdate(cfg2, container); });
      if (result.available) toast(result.commitsBehind + ' update(s) available', 'info');
      else toast('Already up to date', 'success');
    }).catch(function() {
      checkBtn.disabled = false;
      checkBtn.textContent = 'Check Now';
    });
  } }, 'Check Now');
  if (cfg.checking) { checkBtn.disabled = true; checkBtn.textContent = 'Checking...'; }
  actions.appendChild(checkBtn);

  if (cfg.lastResult && cfg.lastResult.available) {
    var applyBtn = el('button', { class: 'btn btn-primary', onclick: function() {
      if (!confirm('Apply update now?\n\nThis will pull the latest code, install dependencies, and restart the server.\nActive builds will be drained first (on Linux with update.sh).')) return;
      applyBtn.disabled = true;
      applyBtn.textContent = 'Applying...';
      api('POST', '/api/auto-update/apply', { confirm: true }).then(function(result) {
        toast('Update started: ' + (result.note || 'Server restarting'), 'success');
      }).catch(function(err) {
        applyBtn.disabled = false;
        applyBtn.textContent = 'Apply Update';
        toast('Update failed: ' + (err.message || 'Unknown error'), 'error');
      });
    } }, 'Apply Update');
    if (cfg.applying) { applyBtn.disabled = true; applyBtn.textContent = 'Applying...'; }
    actions.appendChild(applyBtn);
  }

  container.appendChild(actions);
}

// ── Factory Reset Overlay ──
function showResetOverlay(port) {
  var style = document.createElement('style');
  style.textContent = '@keyframes kspin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);

  var ov = el('div', { style: 'position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center' });
  var box = el('div', { style: 'max-width:420px;text-align:center;padding:32px' });
  var spinner = el('div', { style: 'width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:kspin .8s linear infinite;margin:0 auto 20px' });
  box.appendChild(spinner);
  box.appendChild(el('div', { style: 'font-size:20px;font-weight:700;margin-bottom:8px' }, 'Factory Reset'));

  var statusEl = el('div', { style: 'font-size:15px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5' }, 'Shutting down server...');
  box.appendChild(statusEl);

  var stepsEl = el('div', { style: 'text-align:left;font-family:var(--mono);font-size:14px;line-height:2.2;color:var(--text-secondary)' });
  box.appendChild(stepsEl);
  box.appendChild(el('div', { style: 'margin-top:20px;font-size:13px;color:var(--text-tertiary)' }, 'Do not close this tab.'));
  ov.appendChild(box);
  document.body.appendChild(ov);

  var steps = ['Shutting down server', 'Deleting old files', 'Cloning repository', 'Installing dependencies', 'Starting server'];
  var current = 0;

  function render() {
    clear(stepsEl);
    for (var i = 0; i < steps.length; i++) {
      var done = i < current, active = i === current;
      var color = done ? 'var(--success)' : active ? 'var(--primary)' : 'var(--text-tertiary)';
      var icon = done ? '[done] ' : active ? '[....] ' : '[    ] ';
      stepsEl.appendChild(el('div', { style: 'color:' + color + (active ? ';font-weight:600' : '') }, icon + steps[i]));
    }
    if (current < steps.length) statusEl.textContent = steps[current] + '...';
  }
  render();

  setTimeout(function() { current = 1; render(); }, 4000);
  setTimeout(function() { current = 2; render(); }, 10000);
  setTimeout(function() { current = 3; render(); }, 25000);
  setTimeout(function() { current = 4; render(); }, 50000);

  var startTime = Date.now();
  setTimeout(function() {
    var poll = setInterval(function() {
      if (Date.now() - startTime > 300000) {
        clearInterval(poll);
        spinner.style.animation = 'none'; spinner.style.borderColor = 'var(--error)';
        statusEl.textContent = 'Taking too long. Check _kanban_reset.log in parent folder.';
        return;
      }
      fetch('http://localhost:' + port + '/health', { mode: 'no-cors' }).then(function() {
        clearInterval(poll);
        current = 5;
        clear(stepsEl);
        for (var i = 0; i < steps.length; i++) stepsEl.appendChild(el('div', { style: 'color:var(--success)' }, '[done] ' + steps[i]));
        stepsEl.appendChild(el('div', { style: 'color:var(--success);font-weight:600' }, '[done] Ready'));
        spinner.style.animation = 'none'; spinner.style.borderColor = 'var(--success)'; spinner.style.borderTopColor = 'var(--success)';
        statusEl.textContent = 'Reset complete! Redirecting...';
        setTimeout(function() { window.location.href = 'http://localhost:' + port + '/'; }, 2000);
      }).catch(function() {});
    }, 3000);
  }, 15000);
}

// ══════════════════════════════════════════════
// SSE
// ══════════════════════════════════════════════
var es = new EventSource(CBP + '/api/events');
es.addEventListener('toast', function(e) { var d = JSON.parse(e.data); toast(d.message, d.type); });
es.addEventListener('pipeline-state', function() { loadPipeline(); loadOverview(); });
es.addEventListener('config-updated', function() { loadConfig(); });
es.addEventListener('mode-updated', function(e) { try { _modeState = JSON.parse(e.data); loadConfig(); } catch (_) { loadMode(); loadConfig(); } });
es.addEventListener('discovery-state', function() { loadMode(); });
es.addEventListener('usage-update', function(e) { try { renderUsage(JSON.parse(e.data)); } catch (_) {} });
es.addEventListener('queue-update', function() { loadPipeline(); loadOverview(); });
es.addEventListener('card-activity', function() { loadOverview(); });

// ══════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════
var _modeState = {};
var _cachedUsage = null;
var _cachedPipe = { paused: false };
var _cachedQueue = { active: [], queue: [] };
var _cachedActs = {};

function loadOverview() {
  Promise.all([api('GET', '/api/pipeline'), api('GET', '/api/queue'), api('GET', '/api/activities')])
    .then(function(r) {
      _cachedPipe = r[0]; _cachedQueue = r[1]; _cachedActs = r[2];
      renderOverview(_cachedPipe, _cachedQueue, _cachedActs, _cachedUsage);
    });
}

function loadMode() {
  api('GET', '/api/mode').then(function(d) { _modeState = d; });
}

function loadConfig() {
  Promise.all([api('GET', '/api/config'), api('GET', '/api/mode')])
    .then(function(r) {
      _modeState = r[1];
      renderConfig(r[0], _modeState);
      renderSystem(r[0]);
    });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
var _appInited = false;

function initApp() {
  if (_appInited) return;
  _appInited = true;

  document.getElementById('layout').style.display = '';
  buildNav();
  buildPages();

  // Load all data
  api('GET', '/api/usage').then(function(d) { _cachedUsage = d; renderUsage(d); loadOverview(); });
  loadPipeline();
  loadConfig();
  loadPrompts();
  loadBackups();

  // Periodic refresh
  setInterval(function() { loadPipeline(); loadOverview(); }, 30000);
}

checkSession();

})();
</script>
