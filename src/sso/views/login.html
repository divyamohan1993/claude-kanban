<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #ECECEC;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo .diamond { font-size: 2.5rem; color: #F5B73B; }
  .logo h1 { font-size: 1.5rem; font-weight: 700; margin-top: 0.5rem; color: #ECECEC; }
  .logo p { font-size: 0.9rem; color: #C1BDB9; margin-top: 0.35rem; line-height: 1.5; }
  label { display: block; font-size: 0.95rem; color: #C4C0BC; margin-bottom: 0.5rem; font-weight: 600; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 0.85rem 1rem; background: #111; border: 1px solid #555;
    border-radius: 8px; color: #ECECEC; font-size: 1rem; outline: none;
    line-height: 1.5; transition: border-color 0.2s;
  }
  input:focus { border-color: #F5B73B; box-shadow: 0 0 0 3px rgba(245, 183, 59, 0.25); }
  .field + .field { margin-top: 1rem; }
  button {
    width: 100%; padding: 0.85rem; margin-top: 1.5rem; background: #9A5B0A;
    color: #fff; border: none; border-radius: 8px; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
    min-height: 44px;
  }
  button:hover { background: #7C4A08; }
  button:focus-visible { outline: 3px solid #F5B73B; outline-offset: 2px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #FCA5A5; font-size: 0.9rem; text-align: center; margin-top: 0.75rem; min-height: 1.4em; line-height: 1.5; }
  .hint { text-align: center; font-size: 0.85rem; color: #C1BDB9; margin-top: 1.5rem; line-height: 1.6; }
  .hint code { color: #C4C0BC; background: #2a2a2a; padding: 2px 6px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="diamond" aria-hidden="true">&#x25C6;</div>
    <h1>Claude Kanban</h1>
    <p>Autonomous AI Orchestrator</p>
  </div>
  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" maxlength="64" required autofocus
             placeholder="Username" aria-label="Username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" maxlength="64" required
             placeholder="Password" aria-label="Password" autocomplete="current-password">
    </div>
    <button type="submit" id="submitBtn">Sign In</button>
    <div class="error" id="errorMsg" role="alert" aria-live="polite"></div>
  </form>
  <div class="hint">Test: <code>admin / admin</code> or <code>user / user</code></div>
</div>
<script>
(function() {
  var form = document.getElementById('loginForm');
  var errorMsg = document.getElementById('errorMsg');
  var submitBtn = document.getElementById('submitBtn');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    if (!username || !password) return;
    submitBtn.disabled = true;
    errorMsg.textContent = '';
    var xhr = new XMLHttpRequest();
    var bp = window.__BASE_PATH__ || '';
    xhr.open('POST', bp + '/auth/login');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function() {
      submitBtn.disabled = false;
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.ok) {
          var returnPath = bp + '/';
          try {
            var rawReturn = new URLSearchParams(window.location.search).get('return') || (bp + '/');
            var parsed = new URL(rawReturn, window.location.origin);
            if (parsed.origin === window.location.origin && parsed.pathname.charAt(0) === '/') {
              returnPath = parsed.pathname + parsed.search;
            }
          } catch (e) { /* invalid URL, use default */ }
          window.location.replace(returnPath);
        } else {
          errorMsg.textContent = data.error || 'Authentication failed';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (_) { errorMsg.textContent = 'Unexpected response'; }
    };
    xhr.onerror = function() {
      submitBtn.disabled = false;
      errorMsg.textContent = 'Connection failed';
    };
    xhr.send(JSON.stringify({ username: username, password: password }));
  });
})();
</script>
</body>
</html>
