<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e5e5e5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo .diamond { font-size: 2rem; color: #e8925a; }
  .logo h1 { font-size: 1.3rem; font-weight: 600; margin-top: 0.5rem; }
  .logo p { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
  label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.4rem; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 0.7rem 1rem; background: #111; border: 1px solid #444;
    border-radius: 8px; color: #e5e5e5; font-size: 1rem; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #e8925a; }
  .field + .field { margin-top: 0.75rem; }
  button {
    width: 100%; padding: 0.7rem; margin-top: 1.25rem; background: #e8925a;
    color: #000; border: none; border-radius: 8px; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #d4783f; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #e74c3c; font-size: 0.8rem; text-align: center; margin-top: 0.75rem; min-height: 1.2em; }
  .hint { text-align: center; font-size: 0.7rem; color: #555; margin-top: 1.5rem; line-height: 1.6; }
  .hint code { color: #777; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="diamond" aria-hidden="true">&#x25C6;</div>
    <h1>Claude Kanban</h1>
    <p>Autonomous AI Orchestrator</p>
  </div>
  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" maxlength="64" required autofocus
             placeholder="Username" aria-label="Username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" maxlength="64" required
             placeholder="Password" aria-label="Password" autocomplete="current-password">
    </div>
    <button type="submit" id="submitBtn">Sign In</button>
    <div class="error" id="errorMsg" role="alert" aria-live="polite"></div>
  </form>
  <div class="hint">Test: <code>admin / admin</code> or <code>user / user</code></div>
</div>
<script>
(function() {
  var form = document.getElementById('loginForm');
  var errorMsg = document.getElementById('errorMsg');
  var submitBtn = document.getElementById('submitBtn');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    if (!username || !password) return;
    submitBtn.disabled = true;
    errorMsg.textContent = '';
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/auth/login');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function() {
      submitBtn.disabled = false;
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.ok) {
          var returnTo = new URLSearchParams(window.location.search).get('return') || '/';
          window.location.href = returnTo;
        } else {
          errorMsg.textContent = data.error || 'Authentication failed';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (_) { errorMsg.textContent = 'Unexpected response'; }
    };
    xhr.onerror = function() {
      submitBtn.disabled = false;
      errorMsg.textContent = 'Connection failed';
    };
    xhr.send(JSON.stringify({ username: username, password: password }));
  });
})();
</script>
</body>
</html>
